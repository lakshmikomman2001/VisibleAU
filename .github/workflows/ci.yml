name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit + Integration tests (Vitest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: visibleau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/visibleau_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/visibleau_test
      LLM_MODE: mock
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm test
      # TODO(phase2): Activate Phase 2 config validation in CI once the config is fully seedable.
      # config:validate (LLD §7 / 5082) requires an active config bundle + sampling policy +
      # prompt_pack_coverage='complete' + ≥1 enabled provider. Sprint 1 only seeds providers +
      # quality gates (§5.5); the bundle / sampling policy / coverage seeds land in a later sprint.
      # Until those seeds exist (and the CI test DB runs them after db:migrate), this step would
      # fail CI. Uncomment when config is seedable. Do NOT seed placeholder rows just to pass.
      # - name: Validate Phase 2 config
      #   run: pnpm visibleau config:validate --market AU_EN --locale en-AU

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY_TEST }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
      E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
      E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
      E2E_TEST_USER_2_EMAIL: ${{ secrets.E2E_TEST_USER_2_EMAIL }}
      E2E_TEST_USER_2_PASSWORD: ${{ secrets.E2E_TEST_USER_2_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      DIRECT_URL: ${{ secrets.DATABASE_URL_TEST }}
      LLM_MODE: mock
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
